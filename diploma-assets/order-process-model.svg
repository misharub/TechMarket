<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1180" viewBox="0 0 2200 1180">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 7 L 0 14" fill="none" stroke="#111111" stroke-width="1.2" stroke-linecap="butt" stroke-linejoin="miter"/>
    </marker>
    <style>
      .lane-title { font-family: "Times New Roman", serif; font-size: 27px; font-weight: 700; fill: #111111; }
      .text { font-family: "Times New Roman", serif; font-size: 25px; fill: #111111; }
      .small { font-family: "Times New Roman", serif; font-size: 22px; fill: #111111; }
      .lane { fill: #ffffff; stroke: #111111; stroke-width: 1.5; }
      .step { fill: #ffffff; stroke: #111111; stroke-width: 1.8; }
      .line { stroke: #111111; stroke-width: 1.6; fill: none; marker-end: url(#arrow); stroke-linecap: butt; stroke-linejoin: miter; }
      .plain { stroke: #111111; stroke-width: 1.5; fill: none; stroke-linecap: butt; stroke-linejoin: miter; }
    </style>
  </defs>

  <!-- Lanes -->
  <rect x="80" y="80" width="2000" height="190" class="lane"/>
  <rect x="80" y="270" width="2000" height="190" class="lane"/>
  <rect x="80" y="460" width="2000" height="190" class="lane"/>
  <rect x="80" y="650" width="2000" height="190" class="lane"/>
  <rect x="80" y="840" width="2000" height="190" class="lane"/>

  <rect x="80" y="80" width="240" height="950" fill="#ffffff" stroke="#111111" stroke-width="1.5"/>
  <text x="200" y="180" text-anchor="middle" class="lane-title">Покупатель</text>
  <text x="200" y="370" text-anchor="middle" class="lane-title">Веб-приложение</text>
  <text x="200" y="560" text-anchor="middle" class="lane-title">Серверная часть</text>
  <text x="200" y="750" text-anchor="middle" class="lane-title">База данных</text>
  <text x="200" y="940" text-anchor="middle" class="lane-title">Администратор</text>

  <!-- Customer lane -->
  <rect x="380" y="122" width="235" height="95" class="step"/>
  <text x="497" y="162" text-anchor="middle" class="text">Выбор товара</text>
  <text x="497" y="193" text-anchor="middle" class="text">в каталоге</text>

  <rect x="720" y="122" width="235" height="95" class="step"/>
  <text x="837" y="162" text-anchor="middle" class="text">Проверка</text>
  <text x="837" y="193" text-anchor="middle" class="text">корзины</text>

  <rect x="1060" y="122" width="235" height="95" class="step"/>
  <text x="1177" y="162" text-anchor="middle" class="text">Ввод данных</text>
  <text x="1177" y="193" text-anchor="middle" class="text">заказа</text>

  <rect x="1400" y="122" width="235" height="95" class="step"/>
  <text x="1517" y="162" text-anchor="middle" class="text">Подтверждение</text>
  <text x="1517" y="193" text-anchor="middle" class="text">заказа</text>

  <rect x="1740" y="122" width="235" height="95" class="step"/>
  <text x="1857" y="154" text-anchor="middle" class="text">Получение номера</text>
  <text x="1857" y="185" text-anchor="middle" class="text">заказа и статуса</text>

  <!-- Web lane -->
  <rect x="380" y="312" width="235" height="95" class="step"/>
  <text x="497" y="352" text-anchor="middle" class="text">Отображение</text>
  <text x="497" y="383" text-anchor="middle" class="text">каталога</text>

  <rect x="720" y="312" width="235" height="95" class="step"/>
  <text x="837" y="352" text-anchor="middle" class="text">Отображение</text>
  <text x="837" y="383" text-anchor="middle" class="text">корзины</text>

  <rect x="1060" y="312" width="235" height="95" class="step"/>
  <text x="1177" y="352" text-anchor="middle" class="text">Передача данных</text>
  <text x="1177" y="383" text-anchor="middle" class="text">на сервер</text>

  <rect x="1740" y="312" width="235" height="95" class="step"/>
  <text x="1857" y="352" text-anchor="middle" class="text">Отображение</text>
  <text x="1857" y="383" text-anchor="middle" class="text">результата</text>

  <!-- Server lane -->
  <rect x="720" y="502" width="235" height="95" class="step"/>
  <text x="837" y="542" text-anchor="middle" class="text">Проверка</text>
  <text x="837" y="573" text-anchor="middle" class="text">корзины</text>

  <rect x="1060" y="502" width="235" height="95" class="step"/>
  <text x="1177" y="542" text-anchor="middle" class="text">Расчет итоговой</text>
  <text x="1177" y="573" text-anchor="middle" class="text">стоимости</text>

  <rect x="1400" y="502" width="235" height="95" class="step"/>
  <text x="1517" y="542" text-anchor="middle" class="text">Создание</text>
  <text x="1517" y="573" text-anchor="middle" class="text">заказа</text>

  <!-- DB lane -->
  <rect x="380" y="692" width="235" height="95" class="step"/>
  <text x="497" y="732" text-anchor="middle" class="text">Получение данных</text>
  <text x="497" y="763" text-anchor="middle" class="text">о товарах</text>

  <rect x="1400" y="692" width="235" height="95" class="step"/>
  <text x="1517" y="732" text-anchor="middle" class="text">Сохранение</text>
  <text x="1517" y="763" text-anchor="middle" class="text">заказа</text>

  <rect x="1740" y="692" width="235" height="95" class="step"/>
  <text x="1857" y="732" text-anchor="middle" class="text">Сохранение</text>
  <text x="1857" y="763" text-anchor="middle" class="text">статуса</text>

  <!-- Admin lane -->
  <rect x="1400" y="882" width="235" height="95" class="step"/>
  <text x="1517" y="922" text-anchor="middle" class="text">Просмотр</text>
  <text x="1517" y="953" text-anchor="middle" class="text">заказа</text>

  <rect x="1740" y="882" width="235" height="95" class="step"/>
  <text x="1857" y="922" text-anchor="middle" class="text">Изменение</text>
  <text x="1857" y="953" text-anchor="middle" class="text">статуса</text>

  <!-- Sequence arrows -->
  <path d="M 615 170 L 720 170" class="line"/>
  <path d="M 955 170 L 1060 170" class="line"/>
  <path d="M 1295 170 L 1400 170" class="line"/>
  <path d="M 1635 170 L 1740 170" class="line"/>

  <path d="M 497 217 L 497 312" class="line"/>
  <path d="M 837 217 L 837 312" class="line"/>
  <path d="M 1177 217 L 1177 312" class="line"/>
  <path d="M 1517 217 L 1517 502" class="line"/>

  <path d="M 615 360 L 720 360" class="line"/>
  <path d="M 955 360 L 1060 360" class="line"/>
  <path d="M 1177 407 L 1177 502" class="line"/>
  <path d="M 955 550 L 1060 550" class="line"/>
  <path d="M 1295 550 L 1400 550" class="line"/>
  <path d="M 1517 597 L 1517 692" class="line"/>

  <path d="M 497 692 L 497 407" class="line"/>
  <path d="M 1635 740 L 1740 740" class="line"/>
  <path d="M 1517 787 L 1517 882" class="line"/>
  <path d="M 1635 930 L 1740 930" class="line"/>
  <path d="M 1857 882 L 1857 787" class="line"/>
  <path d="M 1857 692 L 1857 407" class="line"/>

  <!-- Ending response to customer -->
  <path d="M 1857 312 L 1857 217" class="line"/>
</svg>
