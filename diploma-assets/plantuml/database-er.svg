<svg xmlns="http://www.w3.org/2000/svg" width="1980" height="1810" viewBox="0 0 1980 1810">
  <defs>
    <style>      .title { font-family: "Times New Roman", serif; font-size: 34px; font-weight: 700; fill: #111111; }
      .section { display: none; }
      .head { font-family: "Times New Roman", serif; font-size: 18px; font-weight: 700; fill: #ffffff; }
      .field { font-family: "Times New Roman", serif; font-size: 15px; fill: #4e4e4e; }
      .key { font-weight: 700; fill: #333333; }
      .box { fill: #f1f1f1; stroke: #e3e3e3; stroke-width: 1.2; filter: url(#card-shadow); }
      .card-head { fill: #2f6f9f; stroke: #2f6f9f; stroke-width: 1.2; }
      .line { stroke: #9ea4aa; stroke-width: 1.7; fill: none; }
      .label { font-family: "Times New Roman", serif; font-size: 14px; fill: #666666; }
      .note { font-family: "Times New Roman", serif; font-size: 13px; fill: #555555; }</style>
  <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.12" /></filter></defs>

  <rect x="0" y="0" width="1980" height="1810" fill="#f8f8f8" />
  <text x="990" y="48" text-anchor="middle" class="title">ER-диаграмма базы данных интернет-магазина TechMarket</text>

  
  
  
  

  <!-- Relationships are drawn behind entities. -->
  <path class="line" d="M410 305 C615 305 735 615 940 615" />
  <text x="675" y="438" class="label">User 1:N CartItem</text>
  <path class="line" d="M410 320 C615 320 735 775 940 775" />
