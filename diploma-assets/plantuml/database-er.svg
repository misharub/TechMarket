  <text x="1686" y="516" class="label">1:N</text>
  <path class="line" d="M1675 480 C1675 670 1675 670 1675 730" />
  <text x="1686" y="690" class="label">1:N</text>

  <!-- Users and auth -->
  <g transform="translate(50,150)">
    <rect class="box" width="360" height="280" rx="5" ry="5" /><rect class="card-head" width="360" height="42" rx="5" ry="5" />
    <text x="14" y="27" text-anchor="start" class="head">User</text>
    <line class="line" x1="0" y1="42" x2="360" y2="42" />
    <text x="16" y="70" class="field key">PK id : String</text>
    <text x="16" y="95" class="field key">UQ email : String</text>
    <text x="16" y="120" class="field">passwordHash : String?</text>
    <text x="16" y="145" class="field">firstName : String</text>
    <text x="16" y="170" class="field">lastName : String?</text>
    <text x="16" y="195" class="field">phone : String?</text>
    <text x="16" y="220" class="field">role : Role</text>
    <text x="16" y="245" class="field">isBlocked : Boolean</text>
  </g>

  <g transform="translate(50,470)">
    <rect class="box" width="360" height="160" rx="5" ry="5" /><rect class="card-head" width="360" height="42" rx="5" ry="5" />
    <text x="14" y="27" text-anchor="start" class="head">OAuthAccount</text>
    <line class="line" x1="0" y1="42" x2="360" y2="42" />
    <text x="16" y="70" class="field key">PK id : String</text>
    <text x="16" y="95" class="field key">FK userId : String</text>
    <text x="16" y="120" class="field">provider : OAuthProvider</text>
    <text x="16" y="145" class="field">providerUserId : String</text>
  </g>

  <g transform="translate(50,680)">
    <rect class="box" width="360" height="150" rx="5" ry="5" /><rect class="card-head" width="360" height="42" rx="5" ry="5" />
    <text x="14" y="27" text-anchor="start" class="head">RefreshSession</text>
    <line class="line" x1="0" y1="42" x2="360" y2="42" />
    <text x="16" y="70" class="field key">PK id : String</text>
    <text x="16" y="95" class="field key">FK userId : String</text>
    <text x="16" y="120" class="field">tokenHash : String</text>
    <text x="16" y="145" class="field">expiresAt : DateTime</text>
  </g>

  <g transform="translate(50,880)">
