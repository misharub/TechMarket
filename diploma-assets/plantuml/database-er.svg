  <text x="890" y="1500" class="label">1:N</text>
  <path class="line" d="M675 410 L675 470" />
  <text x="686" y="448" class="label">1:0..1</text>
  <path class="line" d="M675 600 L675 640" />
  <text x="686" y="630" class="label">1:N</text>
  <path class="line" d="M675 770 L675 810" />
  <text x="686" y="800" class="label">1:N</text>
  <path class="line" d="M675 1010 L675 1060" />
  <text x="686" y="1042" class="label">1:N</text>
  <path class="line" d="M675 410 C675 1145 675 1145 675 1220" />
  <text x="686" y="1170" class="label">1:N</text>
