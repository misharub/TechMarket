    <text x="16" y="120" class="field">city, street, house : String</text>
    <text x="16" y="145" class="field">apartment, zipCode : String?</text>
    <text x="16" y="170" class="field">isDefault : Boolean</text>
  </g>

  <g transform="translate(50,1110)">
